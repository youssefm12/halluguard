name: Test HalluGuard Action

on:
  pull_request:
    branches: [ "main" ]

permissions:
  pull-requests: write # Required for HalluGuard to post inline review comments

jobs:
  test-halluguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run HalluGuard AI Action
        uses: ./github-action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          severity-threshold: "MEDIUM"
          fail-on-hallucination: "true"
